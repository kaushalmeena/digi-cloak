    <script type="application/ld+json">
      {

        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is Digi-Cloak?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Digi-Cloak is an online web tool to hide a secret message in the image using cryptography and steganography."
            }
          },
          {
            "@type": "Question",
            "name": "How does it work?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "For locking: you provide a message, password and image. Your message is encrypted into unreadable ciphertext using AES encryption with the help of a password, then the ciphertext is hidden in the image using the LSB steganography technique in such a way that the image is unaffected. For unlocking: you provide a password and the image the message is hidden in. The hidden ciphertext is extracted from the image using the LSB steganography technique, then decrypted into a readable message using AES decryption with the help of the password."
            }
          },
          {
            "@type": "Question",
            "name": "What information is retained?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No information is retained, all operations happen in the browser only."
            }
          },
          {
            "@type": "Question",
            "name": "How secure is my message?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Your message, password and image are never transmitted, all locking/unlocking takes place in your browser."
            }
          },
          {
            "@type": "Question",
            "name": "I misplaced my password, is my message recoverable?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No, that is the point. Your message, password and image are never submitted beyond your browser. If the password or image is misplaced, the original message is gone forever."
            }
          },
          {
            "@type": "Question",
            "name": "Is there a limit to the length of message that can be hidden?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, message length should not be greater than 3 times the number of pixels (height x width) in the specified image."
            }
          },
          {
            "@type": "Question",
            "name": "Why is the encoded image always a PNG?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The message is hidden in the least significant bits of individual pixels, so the image must be stored losslessly. PNG preserves every pixel exactly. Converting or re-compressing the encoded image changes pixel values and destroys the hidden message."
            }
          }
        ]
      }
    </script>
