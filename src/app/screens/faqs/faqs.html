<h1 class="text-[32px] font-bold my-5">FAQs</h1>
@for (faq of faqs; track faq.question; let i = $index) {
  <section class="faq my-2.5 text-lg" [class.expanded]="isExpanded(i)">
    <h2 class="m-0">
      <button
        type="button"
        class="faq-toggle flex items-center justify-between gap-2 py-2 w-full border-none bg-transparent text-inherit text-left text-2xl font-bold cursor-pointer"
        [id]="'faq-question-' + i"
        [attr.aria-controls]="'faq-answer-' + i"
        [attr.aria-expanded]="isExpanded(i)"
        (click)="toggle(i)"
      >
        {{ faq.question }}
        <svg
          class="shrink-0 fill-current transition-transform duration-300 motion-reduce:transition-none"
          [class.rotate-180]="isExpanded(i)"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          aria-hidden="true"
        >
          <path d="M7.41 8.59 12 13.17l4.59-4.58L18 10l-6 6-6-6z" />
        </svg>
      </button>
    </h2>
    <div
      class="faq-answer grid transition-[grid-template-rows,opacity] duration-300 ease-in-out motion-reduce:transition-none"
      [class]="isExpanded(i) ? 'grid-rows-[1fr] opacity-100' : 'grid-rows-[0fr] opacity-0'"
      [id]="'faq-answer-' + i"
      role="region"
      [attr.aria-labelledby]="'faq-question-' + i"
    >
      <div class="overflow-hidden min-h-0">
        @for (block of faq.answer; track block.text) {
          @if (block.heading) {
            <h4 class="font-bold my-4">{{ block.heading }}</h4>
          }
          <p class="my-2">{{ block.text }}</p>
        }
      </div>
    </div>
  </section>
}
