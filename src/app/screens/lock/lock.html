<div class="flex gap-5 max-[992px]:flex-col">
  <form class="basis-1/2" (submit)="handleSubmit($event)">
    <app-dropzone
      inputId="image"
      label="Image"
      accept="image/png, image/gif, image/jpeg, image/webp"
      (fileChange)="handleFile($event)"
    />
    <app-password inputId="password" label="Password" [withStrength]="true" />
    <app-textbox
      inputId="message"
      label="Message"
      (valueChange)="handleMessageInput($event)"
    >
      @if (capacity(); as cap) {
        <span
          data-testid="capacity-meter"
          class="text-xs transition duration-300 starting:opacity-0 motion-reduce:transition-none"
          [class.opacity-70]="fits()"
          [class.text-destructive]="!fits()"
          [attr.title]="
            fits()
              ? 'Characters used / approximate image capacity'
              : 'Message too large for this image'
          "
        >
          {{ messageBytes() }} / ~{{ cap }}
        </span>
      }
    </app-textbox>
    <div class="flex flex-wrap items-center justify-center mt-[36px] gap-2.5">
      <button
        type="submit"
        class="max-md:w-full inline-flex items-center justify-center px-4 min-w-[150px] min-h-[50px] rounded-[3px] bg-primary text-primary-foreground text-lg cursor-pointer transition duration-300 hover:opacity-90 disabled:opacity-55 disabled:cursor-not-allowed focus-visible:outline-2 focus-visible:outline-offset-2"
        [disabled]="busy() || !fits()"
        [attr.aria-busy]="busy()"
      >
        @if (busy()) {
          <app-loader [size]="22" />
        } @else {
          Lock
        }
      </button>
      <button
        type="button"
        data-testid="save-button"
        class="max-md:w-full inline-flex items-center justify-center px-4 min-w-[150px] min-h-[50px] rounded-[3px] bg-secondary text-secondary-foreground ring-1 ring-border text-lg cursor-pointer transition duration-300 hover:bg-accent active:bg-muted disabled:bg-disabled disabled:opacity-55 disabled:cursor-not-allowed disabled:outline-none focus-visible:outline-2 focus-visible:outline-offset-2"
        [disabled]="!encodedImageSource() || busy()"
        (click)="handleSave()"
      >
        Save
      </button>
      <button
        type="button"
        data-testid="compare-button"
        class="max-md:w-full inline-flex items-center justify-center px-4 min-w-[150px] min-h-[50px] rounded-[3px] bg-secondary text-secondary-foreground ring-1 ring-border text-lg cursor-pointer transition duration-300 hover:bg-accent active:bg-muted disabled:bg-disabled disabled:opacity-55 disabled:cursor-not-allowed disabled:outline-none focus-visible:outline-2 focus-visible:outline-offset-2"
        [disabled]="!encodedImageSource() || busy()"
        (click)="openCompare()"
      >
        Compare
      </button>
    </div>
  </form>
  <div class="basis-1/2">
    <app-figure
      label="Preview Image"
      alt="Preview-Image"
      [source]="previewImageSource()"
    />
    <app-figure
      label="Encoded Image"
      alt="Output-Image"
      [source]="encodedImageSource()"
    />
    <p class="mt-4 text-xs text-center opacity-70">
      The encoded image is saved as PNG. Re-compressing or converting it (for
      example to JPEG) will destroy the hidden message.
    </p>
  </div>
</div>
<!-- Click-to-dismiss on the backdrop only; keyboard users close via Escape (handled through the dialog's cancel event). -->
<!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events, @angular-eslint/template/interactive-supports-focus -->
<dialog
  #compareDialog
  class="m-auto p-0 w-[min(94vw,1100px)] bg-transparent overflow-visible opacity-0 scale-95 translate-y-4 transition-[opacity,scale,translate,overlay,display] transition-discrete duration-300 ease-out open:opacity-100 open:scale-100 open:translate-y-0 starting:open:opacity-0 starting:open:scale-95 starting:open:translate-y-4 backdrop:bg-black/0 backdrop:transition-[background-color,overlay,display] backdrop:transition-discrete backdrop:duration-300 open:backdrop:bg-black/60 starting:open:backdrop:bg-black/0 motion-reduce:transition-none motion-reduce:backdrop:transition-none"
  aria-label="Compare original and encoded image"
  (click)="onDialogClick($event)"
>
  <div class="relative">
    <button
      type="button"
      class="absolute -top-10 right-0 flex items-center justify-center h-8 w-8 rounded-full border-none bg-transparent cursor-pointer stroke-white opacity-80 transition-opacity duration-300 hover:opacity-100 focus-visible:outline-2 focus-visible:outline-offset-2"
      aria-label="Close comparison"
      (click)="closeCompare()"
    >
      <svg
        width="24"
        height="24"
        viewBox="0 0 24 24"
        stroke-width="2"
        fill="none"
        aria-hidden="true"
      >
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
    @if (encodedImageSource()) {
      <app-compare
        [before]="previewImageSource()"
        [after]="encodedImageSource()"
      />
    }
  </div>
</dialog>
<app-snackbar />
