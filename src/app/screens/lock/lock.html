<h1 class="text-[32px] font-bold my-5">Lock</h1>
<div class="flex gap-5 max-[992px]:flex-col">
  <form class="basis-1/2" (submit)="handleSubmit($event)">
    <div class="flex flex-col">
      <label class="mt-4 mb-2.5 text-base" for="message">Message</label>
      <textarea
        id="message"
        class="px-2.5 min-h-[30px] rounded-[3px] bg-muted text-foreground caret-foreground text-sm leading-[30px] appearance-none outline-none shadow-[inset_0_0_0_1px_#10161a26,inset_0_1px_1px_#10161a33]"
        name="message"
        rows="7"
        required
      ></textarea>
    </div>
    <div class="flex flex-col">
      <label class="mt-4 mb-2.5 text-base" for="image">Image</label>
      <input
        required
        id="image"
        name="image"
        type="file"
        accept="image/png, image/gif, image/jpeg, image/webp"
        class="px-2.5 min-h-[30px] rounded-[3px] bg-muted text-foreground text-sm leading-[30px] outline-none shadow-[inset_0_0_0_1px_#10161a26,inset_0_1px_1px_#10161a33]"
        (change)="handlePreview($event)"
      />
    </div>
    <div class="flex flex-col">
      <label class="mt-4 mb-2.5 text-base" for="password">Password</label>
      <input
        required
        id="password"
        class="px-2.5 min-h-[30px] rounded-[3px] bg-muted text-foreground caret-foreground text-sm leading-[30px] appearance-none outline-none shadow-[inset_0_0_0_1px_#10161a26,inset_0_1px_1px_#10161a33]"
        name="password"
        type="password"
      />
    </div>
    <div class="button-container flex items-center justify-center mt-[52px] gap-2.5">
      <button
        type="submit"
        class="inline-flex items-center justify-center px-4 min-w-[150px] min-h-[50px] rounded-[3px] bg-secondary text-secondary-foreground ring-1 ring-border text-left text-lg cursor-pointer hover:bg-accent active:bg-muted"
      >
        Lock
      </button>
      <button
        type="button"
        class="inline-flex items-center justify-center px-4 min-w-[150px] min-h-[50px] rounded-[3px] bg-secondary text-secondary-foreground ring-1 ring-border text-left text-lg cursor-pointer hover:bg-accent active:bg-muted disabled:bg-disabled disabled:opacity-55 disabled:cursor-not-allowed disabled:outline-none"
        [disabled]="!encodedImageSource()"
        (click)="handleSave()"
      >
        Save
      </button>
    </div>
  </form>
  <div class="basis-1/2">
    <app-image-card
      label="Preview Image"
      alt="Preview-Image"
      [source]="previewImageSource()"
    />
    <app-image-card
      label="Encoded Image"
      alt="Output-Image"
      [source]="encodedImageSource()"
    />
  </div>
</div>
<app-snackbar />
