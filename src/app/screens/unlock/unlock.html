<div class="flex gap-5 max-[992px]:flex-col">
  <form class="basis-1/2" (submit)="handleSubmit($event)">
    <app-dropzone
      inputId="image"
      label="Encoded Image"
      accept="image/png, image/gif, image/jpeg"
      (fileChange)="handleFile($event)"
    />
    <app-password inputId="password" label="Password" />
    <div class="mt-[36px] flex flex-wrap items-center justify-center gap-2.5">
      <button
        type="submit"
        class="inline-flex min-h-[50px] min-w-[150px] cursor-pointer items-center justify-center rounded-[3px] bg-primary px-4 text-lg text-primary-foreground transition-[opacity,scale] duration-300 hover:opacity-90 focus-visible:outline-2 focus-visible:outline-offset-2 enabled:active:scale-[98%] disabled:cursor-not-allowed disabled:opacity-55 max-md:w-full"
        [disabled]="busy()"
        [attr.aria-busy]="busy()"
      >
        @if (busy()) {
          <app-loader [size]="22" />
        } @else {
          Unlock
        }
      </button>
      <button
        type="button"
        data-testid="copy-button"
        class="inline-flex min-h-[50px] min-w-[150px] cursor-pointer items-center justify-center rounded-[3px] bg-secondary px-4 text-lg text-secondary-foreground ring-1 ring-border transition-[opacity,scale] duration-300 focus-visible:outline-2 focus-visible:outline-offset-2 enabled:hover:opacity-70 enabled:active:scale-[98%] disabled:cursor-not-allowed disabled:opacity-55 disabled:outline-none max-md:w-full"
        (click)="handleCopy()"
        [disabled]="!decodedMessage() || busy()"
      >
        Copy
      </button>
    </div>
  </form>
  <div class="basis-1/2">
    <app-figure
      label="Preview Image"
      alt="Preview-Image"
      [source]="previewImageSource()"
    />
    <app-textbox
      inputId="message"
      label="Decrypted Message"
      [readonly]="true"
      [value]="decodedMessage()"
    />
  </div>
</div>
<app-snackbar />
