@if (visible()) {
  <div
    data-testid="snackbar"
    class="fixed right-0 bottom-0 m-5 flex w-[calc(100vw-40px)] origin-center items-center justify-between rounded border-l-4 bg-primary px-3.5 py-2.5 text-primary-foreground shadow-[0_3px_5px_-1px_#00000033,0_6px_10px_#00000024,0_1px_18px_#0000001f] sm:w-auto sm:max-w-md sm:min-w-[344px]"
    [class.border-destructive]="kind() === 'error'"
    [class.border-success]="kind() === 'success'"
    [class.border-transparent]="kind() === 'info'"
    animate.enter="animate-snackbar-in motion-reduce:animate-none"
    animate.leave="animate-snackbar-out motion-reduce:animate-none"
  >
    {{ message() }}
    <button
      type="button"
      data-testid="snackbar-close"
      class="flex cursor-pointer items-center justify-between border-none bg-transparent pl-2 transition-opacity duration-300 hover:opacity-[0.52] focus-visible:outline-2 focus-visible:outline-offset-2"
      aria-label="Dismiss notification"
      (click)="hide()"
    >
      <svg
        class="stroke-primary-foreground"
        width="24"
        height="24"
        viewBox="0 0 24 24"
        stroke-width="2"
      >
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </div>
}
