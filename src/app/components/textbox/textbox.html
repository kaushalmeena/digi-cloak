<div class="mt-4 mb-2.5 flex items-baseline justify-between">
  <label class="text-base" [for]="inputId()">{{ label() }}</label>
  <ng-content />
</div>
<textarea
  class="min-h-[30px] w-full appearance-none rounded-[3px] bg-muted px-2.5 text-sm leading-[30px] text-foreground caret-foreground shadow-[inset_0_0_0_1px_#10161a26,inset_0_1px_1px_#10161a33] outline-none focus-visible:outline-2 focus-visible:outline-offset-2"
  [id]="inputId()"
  [attr.name]="name()"
  [rows]="rows()"
  [readOnly]="readonly()"
  [required]="!readonly()"
  [value]="value()"
  (input)="onInput($event)"
></textarea>
