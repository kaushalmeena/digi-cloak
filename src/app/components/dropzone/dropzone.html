<div class="mt-4 mb-2.5 flex items-baseline justify-between">
  <label class="text-base" [for]="inputId()">{{ label() }}</label>
</div>
<button
  type="button"
  data-testid="dropzone"
  class="flex min-h-[120px] w-full cursor-pointer flex-col items-center justify-center gap-1 rounded-[3px] border-2 border-dashed bg-muted px-4 py-3 text-sm text-foreground focus-visible:outline-2 focus-visible:outline-offset-2"
  [class]="dragging() ? 'border-foreground/60' : 'border-border'"
  (click)="fileInput.click()"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)"
>
  @if (file()) {
    <span
      data-testid="file-info"
      class="font-medium break-all transition-opacity duration-300 motion-reduce:transition-none starting:opacity-0"
      >{{ fileInfo() }}</span
    >
    <span class="opacity-55">Click, drop, or paste to replace</span>
  } @else {
    <svg
      class="h-8 w-8 fill-foreground opacity-55"
      viewBox="0 0 24 24"
      aria-hidden="true"
    >
      <path
        d="M19.35 10.04A7.49 7.49 0 0 0 12 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 0 0 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"
      />
    </svg>
    <span>Drag &amp; drop an image, paste, or click to browse</span>
  }
</button>
<input
  #fileInput
  class="hidden"
  [id]="inputId()"
  name="image"
  type="file"
  [accept]="accept()"
  (change)="onInputChange($event)"
/>
