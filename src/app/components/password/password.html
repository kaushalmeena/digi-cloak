<div class="flex items-baseline justify-between mt-4 mb-2.5">
  <label class="text-base" [for]="inputId()">{{ label() }}</label>
  @if (withStrength()) {
    <span
      data-testid="strength"
      class="text-xs transition-opacity duration-300"
      [class]="strength()?.colorClass ?? ''"
      [class.opacity-0]="!strength()"
      [attr.aria-hidden]="!strength()"
      aria-live="polite"
      >{{ strength()?.label ?? 'Weak' }} password</span
    >
  }
</div>
<div class="relative flex">
  <input
    required
    [id]="inputId()"
    class="flex-1 px-2.5 pr-10 min-h-[40px] rounded-[3px] bg-muted text-foreground caret-foreground text-sm leading-[30px] appearance-none outline-none shadow-[inset_0_0_0_1px_#10161a26,inset_0_1px_1px_#10161a33] focus-visible:outline-2 focus-visible:outline-offset-2"
    name="password"
    [type]="revealed() ? 'text' : 'password'"
    autocomplete="off"
    (input)="onInput($event)"
  />
  <button
    type="button"
    data-testid="reveal-password"
    class="absolute right-0 top-0 bottom-0 flex items-center px-2 border-none bg-transparent cursor-pointer opacity-55 transition-opacity duration-300 hover:opacity-90 fill-foreground focus-visible:outline-2"
    [attr.aria-label]="revealed() ? 'Hide password' : 'Show password'"
    [attr.aria-pressed]="revealed()"
    (click)="toggleRevealed()"
  >
    @if (revealed()) {
      <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78 3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"
        />
      </svg>
    } @else {
      <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"
        />
      </svg>
    }
  </button>
</div>
